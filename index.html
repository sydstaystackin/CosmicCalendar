<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cosmic Calendar</title>
<style>
  :root{
    --void:#0E0B14; --void2:#0A0810; --ink:#181222; --ink2:#211931;
    --line:#2C2438; --moonlight:#EDE6D6; --dust:#9C93A8; --faint:#5A5168;
    --gold:#C9A24B; --ember:#C65A2E; --sage:#86946A; --amethyst:#A684D0; --candle:#E0A23C;
    --serif:"Hoefler Text","Didot","Bodoni MT",Georgia,serif;
    --sans:"Avenir Next","Segoe UI",Inter,-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--void);color:var(--moonlight);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden;line-height:1.5}
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.7}
  .wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 18px 110px}
  .eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--faint);font-weight:600}
  h1,h2,h3{font-family:var(--serif);font-weight:500}
  button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
  .btn{background:var(--ink2);border:1px solid var(--line);color:var(--moonlight);padding:12px 16px;border-radius:999px;font-size:13px;letter-spacing:.04em;transition:.18s}
  .btn.gold{border-color:var(--gold);color:var(--gold)}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:6px}
  .mast{padding:38px 0 6px;text-align:center}
  .mast .eyebrow{margin-bottom:13px}
  .mast h1{font-size:clamp(38px,11vw,58px);line-height:.95;letter-spacing:.02em}
  .sec{margin-top:34px;display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .sec h2{font-size:25px}

  /* tonight */
  .tonight{display:flex;gap:22px;align-items:center;background:linear-gradient(160deg,var(--ink),var(--void2));border:1px solid var(--line);border-radius:26px;padding:24px 22px;margin-top:22px;position:relative;overflow:hidden}
  .tonight::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(201,162,75,.10),transparent 70%)}
  .moonbox{flex:0 0 92px;height:92px;position:relative}
  .moonglow{position:absolute;inset:-14px;border-radius:50%;background:radial-gradient(circle,rgba(237,230,214,.22),transparent 65%)}
  svg.moon{display:block;border-radius:50%;position:relative}
  .tnow{flex:1;min-width:0}
  .tnow .eyebrow{margin-bottom:7px}
  .tnow .phase{font-family:var(--serif);font-size:22px;line-height:1.1}
  .tnow .sign{color:var(--gold);font-style:italic}
  .tnow .sub{font-size:12.5px;color:var(--dust);margin-top:8px}
  .illum{margin-top:9px;height:4px;background:var(--ink2);border-radius:2px;overflow:hidden;max-width:200px}
  .illum i{display:block;height:100%;background:linear-gradient(90deg,var(--faint),var(--moonlight))}

  /* event list */
  .events{margin-top:16px;display:flex;flex-direction:column;gap:11px}
  .ev{display:flex;gap:16px;align-items:center;background:var(--ink);border:1px solid var(--line);border-radius:18px;padding:15px 17px;text-align:left;width:100%;transition:.18s;position:relative}
  .ev:hover{border-color:var(--gold);transform:translateY(-1px)}
  .ev.past{opacity:.5} .ev.next{border-color:rgba(201,162,75,.55)}
  .ev .gl{flex:0 0 40px;height:40px}
  .ev .meta{flex:1;min-width:0}
  .ev .d{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .ev .nm{font-family:var(--serif);font-size:18px;line-height:1.12;margin:2px 0 1px}
  .ev .deg{font-size:11.5px;color:var(--gold);font-style:italic}
  .ev .ecl{display:inline-block;font-size:9px;letter-spacing:.14em;color:var(--ember);border:1px solid rgba(198,90,46,.5);border-radius:6px;padding:1px 5px;margin-left:6px}
  .ev .nextpill{position:absolute;top:-8px;right:14px;font-size:9px;letter-spacing:.18em;background:var(--gold);color:var(--void);padding:2px 8px;border-radius:6px;font-weight:700}

  /* calendar */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin:22px 0 14px}
  .calm{font-family:var(--serif);font-size:23px}
  .navb{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--ink);font-size:18px;color:var(--moonlight)}
  .navb:hover{border-color:var(--gold);color:var(--gold)}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px}
  .dow span{text-align:center;font-size:10px;letter-spacing:.12em;color:var(--faint)}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cell{aspect-ratio:1;background:var(--ink);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;position:relative;padding:4px;transition:.14s}
  .cell.empty{background:transparent;border:none}
  .cell:not(.empty):hover{border-color:var(--gold)}
  .cell.today{border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,162,75,.3)}
  .cell.haslun{background:var(--ink2)}
  .cell .cmoon{line-height:0}
  .cell .cnum{font-size:12px;color:var(--moonlight)}
  .cell.empty .cnum{display:none}
  .cmarks{display:flex;gap:3px;height:6px}
  .lmark{width:5px;height:5px;border-radius:50%;display:block}
  .uerow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--ink);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:7px}
  .uerow b{font-weight:600;font-size:14px}
  .del{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);color:var(--dust);font-size:12px;flex:0 0 auto}
  .del:hover{border-color:var(--ember);color:var(--ember)}
  .lunbtn{display:flex;align-items:center;gap:13px;width:100%;background:var(--ink2);border:1px solid var(--line);border-radius:14px;padding:13px 15px;text-align:left}
  .lunbtn:hover{border-color:var(--gold)}
  .lunbtn b{font-family:var(--serif);font-size:16px;font-weight:500}

  /* phone book */
  .pbook{display:flex;flex-direction:column;gap:2px;margin-top:6px}
  .prow{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:15px 8px;border-bottom:1px solid var(--line);transition:.14s}
  .prow:hover{padding-left:14px}
  .pglyph{flex:0 0 34px;height:34px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--gold)}
  .pname{font-family:var(--serif);font-size:19px}
  .prole{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-left:auto}
  .pchev{color:var(--faint);font-size:18px;margin-left:8px}
  .prow.add .pname{color:var(--dust);font-family:var(--sans);font-size:15px}
  .prow.add .pglyph{color:var(--dust)}

  /* tab bar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:center;gap:6px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(10,8,16,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line)}
  .tabbar button{flex:1;max-width:150px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border-radius:14px;font-size:18px;color:var(--faint);transition:.16s}
  .tabbar button span{font-size:10px;letter-spacing:.08em}
  .tabbar button.on{color:var(--gold)}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(8,6,12,.78);backdrop-filter:blur(7px);z-index:50;opacity:0;pointer-events:none;transition:.22s}
  .scrim.on{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,100%);width:100%;max-width:600px;max-height:92vh;background:var(--void2);border:1px solid var(--line);border-bottom:none;border-radius:26px 26px 0 0;z-index:51;transition:transform .26s cubic-bezier(.2,.7,.2,1);overflow:hidden;display:flex;flex-direction:column}
  .sheet.on{transform:translate(-50%,0)}
  .grab{flex:0 0 auto;display:flex;justify-content:center;padding:11px 0 4px}
  .grab i{width:38px;height:4px;border-radius:3px;background:var(--line)}
  .shead{padding:6px 22px 0;text-align:center}
  .shead .d{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
  .shead h2{font-size:26px;line-height:1.05;margin:4px 0 2px}
  .shead .deg{font-size:12.5px;color:var(--gold);font-style:italic}
  .shead .peak{font-size:11px;color:var(--dust);margin-top:6px}
  .tabs{display:flex;gap:6px;padding:15px 18px 12px;justify-content:center;flex-wrap:wrap}
  .tab{font-size:12px;letter-spacing:.04em;padding:8px 13px;border-radius:999px;border:1px solid var(--line);color:var(--dust);transition:.16s}
  .tab.on{background:rgba(166,132,208,.16);border-color:var(--amethyst);color:var(--amethyst)}
  .tab[data-k=a].on{background:rgba(134,148,106,.16);border-color:var(--sage);color:var(--sage)}
  .tab[data-k=f].on{background:rgba(166,132,208,.16);border-color:var(--amethyst);color:var(--amethyst)}
  .tab[data-k=g].on{background:rgba(224,162,60,.16);border-color:var(--candle);color:var(--candle)}
  .sbody{overflow-y:auto;padding:4px 22px 40px;-webkit-overflow-scrolling:touch}
  .blk{margin-top:18px}
  .blk h4{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:9px;font-weight:700}
  .blk p{font-size:14.5px;color:#D8D0E0;line-height:1.6}
  .blk p .hl{color:var(--moonlight)}
  ul.pl{list-style:none;display:flex;flex-direction:column;gap:6px;margin-top:4px}
  ul.pl li{font-size:13.5px;color:#CFC7DC;padding-left:18px;position:relative;line-height:1.45}
  ul.pl li::before{content:"";position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%}
  .acc-a ul.pl li::before{background:var(--sage)} .acc-f ul.pl li::before{background:var(--amethyst)} .acc-g ul.pl li::before{background:var(--candle)}
  .tea{background:rgba(201,162,75,.07);border:1px solid rgba(201,162,75,.22);border-radius:14px;padding:14px 15px;font-size:13.5px;color:#E6DCC6;font-style:italic;line-height:1.6}
  .corr{display:grid;grid-template-columns:auto 1fr;gap:7px 14px;font-size:13px}
  .corr dt{color:var(--faint);text-transform:uppercase;letter-spacing:.1em;font-size:10.5px;padding-top:2px}
  .corr dd{color:#D8D0E0}
  .ritual{background:var(--ink);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-top:6px}
  .ritual .rn{font-family:var(--serif);font-size:17px;color:var(--candle)}
  .ritual .why{font-size:12.5px;color:var(--dust);font-style:italic;margin:5px 0 12px}
  .step{display:flex;gap:11px;align-items:flex-start;padding:7px 0;font-size:13.5px;color:#D2CADE;cursor:pointer}
  .step .ck{flex:0 0 19px;height:19px;border:1.5px solid var(--faint);border-radius:6px;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s}
  .step.done .ck{background:var(--candle);border-color:var(--candle)}
  .step.done .ck::after{content:"\2713";color:var(--void);font-size:12px;font-weight:800}
  .step.done span{color:var(--faint);text-decoration:line-through}
  .tarot{display:flex;gap:8px;overflow-x:auto;padding:6px 0 8px}
  .tcard{flex:0 0 116px;background:linear-gradient(170deg,var(--ink2),var(--ink));border:1px solid var(--line);border-radius:11px;padding:11px;min-height:96px}
  .tcard .tno{font-family:var(--serif);font-size:20px;color:var(--gold);font-style:italic}
  .tcard .tq{font-size:11.5px;color:#CFC7DC;line-height:1.35;margin-top:6px}
  .syn{display:flex;flex-direction:column;gap:9px}
  .synrow{background:var(--ink);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .synrow .sa{font-size:12px;color:var(--gold);font-style:italic;font-family:var(--serif)}
  .synrow .sd{font-size:13px;color:#D2CADE;margin-top:3px;line-height:1.45}
  .form .field{margin-bottom:13px}
  .form label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  .form input,.form textarea{width:100%;background:var(--void2);border:1px solid var(--line);color:var(--moonlight);border-radius:11px;padding:11px 12px;font-family:inherit;font-size:14px}
  .form textarea{min-height:84px;resize:vertical;line-height:1.5}
  .form .hint{font-size:11.5px;color:var(--dust);margin-top:5px;line-height:1.45}
  .closex{position:absolute;top:14px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--ink);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--dust);z-index:3}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<canvas class="stars" id="stars"></canvas>
<div class="wrap">
  <header class="mast"><div class="eyebrow">a personal cosmos &nbsp;·&nbsp; mmxxvi</div><h1>Cosmic Calendar</h1></header>

  <div class="viewc" id="view-sky">
    <section class="tonight" aria-label="Tonight">
      <div class="moonbox"><div class="moonglow"></div><div id="livemoon"></div></div>
      <div class="tnow"><div class="eyebrow">tonight's sky</div><div class="phase" id="tphase">—</div>
        <div class="sub" id="tsub">reading the sky…</div><div class="illum"><i id="tillum" style="width:0%"></i></div></div>
    </section>
    <div class="sec"><h2>Illuminations</h2><div class="eyebrow">2026</div></div>

  <div class="viewc" id="view-cal" style="display:none"><div id="calwrap"></div></div>

  <div class="viewc" id="view-orbit" style="display:none">
    <div class="sec" style="margin-top:24px"><h2>Entanglements</h2><div class="eyebrow">your orbit</div></div>
    <div id="orbitwrap"></div>
  </div>
</div>

<nav class="tabbar">
  <button data-v="sky" class="on">🌙<span>Sky</span></button>

</nav>

</div>

<script>

(function(){const c=document.getElementById('stars'),x=c.getContext('2d');
function size(){c.width=innerWidth;c.height=innerHeight;draw()}
function draw(){x.clearRect(0,0,c.width,c.height);const n=Math.floor((c.width*c.height)/9000);
for(let i=0;i<n;i++){const px=Math.random()*c.width,py=Math.random()*c.height,r=Math.random()*1.3;
x.globalAlpha=Math.random()*.6+.15;x.fillStyle=Math.random()>.85?'#C9A24B':'#EDE6D6';x.beginPath();x.arc(px,py,r,0,7);x.fill();}x.globalAlpha=1;}
addEventListener('resize',size);size();})();

/* ============ ASTRONOMY ============ */
const SIGNS=["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"];
const GLYPH=["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
const D2R=Math.PI/180;
function norm(a){a%=360;return a<0?a+360:a;}
function daysSinceJ2000(date){ return (date.getTime()/86400000) + 2440587.5 - 2451545.0; }
function sunLon(n){
  const L=norm(280.460+0.9856474*n), g=norm(357.528+0.9856003*n)*D2R;
  return norm(L+1.915*Math.sin(g)+0.020*Math.sin(2*g));
}
function moonLon(n){
  const Lp=norm(218.316+13.176396*n), D=norm(297.850+12.190749*n)*D2R,
        M=norm(357.529+0.985600*n)*D2R, Mp=norm(134.963+13.064993*n)*D2R;
  let l=Lp + 6.289*Math.sin(Mp) - 1.274*Math.sin(Mp-2*D) + 0.658*Math.sin(2*D)
        - 0.186*Math.sin(M) - 0.059*Math.sin(2*Mp-2*D) - 0.057*Math.sin(Mp-2*D+M)
        + 0.053*Math.sin(Mp+2*D) + 0.046*Math.sin(2*D-M) + 0.041*Math.sin(Mp-M)
        - 0.035*Math.sin(D) - 0.031*Math.sin(Mp+M);
  return norm(l);
}
function skyNow(date){
  const n=daysSinceJ2000(date), sl=sunLon(n), ml=moonLon(n);
  const elong=norm(ml-sl);
  const illum=(1-Math.cos(elong*D2R))/2;
  const waxing=elong<180;
  const si=Math.floor(norm(ml)/30), deg=norm(ml)-si*30;
  let phase;
  if(elong<11.25||elong>=348.75)phase="New Moon";
  else if(elong<78.75)phase="Waxing Crescent";
  else if(elong<101.25)phase="First Quarter";
  else if(elong<168.75)phase="Waxing Gibbous";
  else if(elong<191.25)phase="Full Moon";
  else if(elong<258.75)phase="Waning Gibbous";
  else if(elong<281.25)phase="Last Quarter";
  else phase="Waning Crescent";
  return {illum,waxing,sign:SIGNS[si],signIdx:si,deg,phase};
}
/* draw a moon to its illuminated fraction */
function moonSVG(R,illum,waxing,size){
  size=size||R*2; const cx=size/2,cy=size/2;
  let lit;
  if(illum<0.02) lit="";
  else if(illum>0.98) lit=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#mg)"/>`;
  else{
    const rx=R*Math.abs(1-2*illum);
    const outer=waxing?1:0;
    const inner=(illum<0.5)?(waxing?0:1):(waxing?1:0);
    lit=`<path d="M ${cx} ${cy-R} A ${R} ${R} 0 0 ${outer} ${cx} ${cy+R} A ${rx} ${R} 0 0 ${inner} ${cx} ${cy-R} Z" fill="url(#mg)"/>`;
  }
  return `<svg class="moon" viewBox="0 0 ${size} ${size}" aria-hidden="true">
    <defs><radialGradient id="mg" cx="38%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#FBF6EA"/><stop offset="60%" stop-color="#E3DAC6"/><stop offset="100%" stop-color="#B9AE96"/>
    </radialGradient></defs>
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="#15111D"/>
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#2C2438" stroke-width="1"/>
    ${lit}
    <circle cx="${cx-R*0.3}" cy="${cy-R*0.2}" r="${R*0.13}" fill="#000" opacity=".07"/>
    <circle cx="${cx+R*0.25}" cy="${cy+R*0.28}" r="${R*0.1}" fill="#000" opacity=".06"/>
    <circle cx="${cx+R*0.05}" cy="${cy-R*0.4}" r="${R*0.07}" fill="#000" opacity=".06"/>
  </svg>`;
}
/* glyph for an event by type */
function eventMoon(type,size){
  if(type==='full')return moonSVG(size/2-1,1,true,size);
  if(type==='new')return moonSVG(size/2-1,0,true,size);
  return moonSVG(size/2-1,0.5,true,size);
}

/* ============ DATA: CHARTS (exact, from Drive) ============ */
function L(p){for(const k in p)p[k].lon=p[k].sign*30+p[k].deg;return p;}
const SYD={ name:"Syd", planets:L({
  Sun:{sign:7,deg:12.92,house:8}, Moon:{sign:0,deg:25.95,house:2}, Asc:{sign:11,deg:8.52,house:1},
  Mercury:{sign:7,deg:2.38,house:8}, Venus:{sign:8,deg:2.98,house:9}, Mars:{sign:8,deg:11.53,house:9},
  Jupiter:{sign:8,deg:16.98,house:9}, Saturn:{sign:11,deg:18.22,house:1},
  Uranus:{sign:9,deg:26.90,house:11}, Neptune:{sign:9,deg:23.05,house:11}, Pluto:{sign:7,deg:29.80,house:9}
})};

/* ============ DATA: PEOPLE (all exact) ============ */
const PEOPLE=[
  {id:'christian',name:"Christian",role:"New Bae",cat:'roster',sunDate:"10-12",accent:"#A684D0",on:true,
   planets:L({Sun:{sign:6,deg:19.17},Moon:{sign:5,deg:6.98},Asc:{sign:6,deg:20.50},Mercury:{sign:7,deg:13.97},Venus:{sign:5,deg:25.65},Mars:{sign:7,deg:10.50},Jupiter:{sign:6,deg:23.75},Saturn:{sign:10,deg:23.83},Uranus:{sign:9,deg:18.32},Neptune:{sign:9,deg:18.42},Pluto:{sign:7,deg:24.03}}),

/* ============ SYNASTRY ENGINE (exact degrees) ============ */
const ASPECTS=[
  {n:"conjunction",a:0,orb:8,v:"fused — same wavelength, can't tell where one ends"},
  {n:"opposition",a:180,orb:8,v:"magnetic push-pull, mirror + tension"},
  {n:"trine",a:120,orb:7,v:"flows — feels familiar, maybe too easy"},
  {n:"square",a:90,orb:7,v:"friction + heat, the reckless kind"},
  {n:"sextile",a:60,orb:5,v:"easy spark, low-effort chemistry"},
];
const KEY=["Sun","Moon","Venus","Mars","Mercury","Asc"];
function sep(a,b){let d=Math.abs(a-b)%360;return d>180?360-d:d;}
function synastry(person){
  const out=[];
  for(const tp in person.planets){const tl=person.planets[tp].lon;
    for(const mp in SYD.planets){
      if(!KEY.includes(tp)&&!KEY.includes(mp))continue;
      const s=sep(tl,SYD.planets[mp].lon);
      for(const asp of ASPECTS){const orb=Math.abs(s-asp.a);
        if(orb<=asp.orb){
          const strength=(asp.orb-orb)/asp.orb+(KEY.includes(tp)?.5:0)+(KEY.includes(mp)?.5:0)+((asp.n==="conjunction"||asp.n==="opposition")?.5:0);
          out.push({strength,
            a:`their ${tp} ${asp.n} your ${mp}`,
            d:`${SIGNS[person.planets[tp].sign]} ${tp.toLowerCase()} ${asp.n==="conjunction"?"right on":asp.n+" to"} your ${SIGNS[SYD.planets[mp].sign]} ${mp.toLowerCase()} · ${orb.toFixed(1)}° orb — ${asp.v}`});
          break;
        }}}}
  return out.sort((a,b)=>b.strength-a.strength).slice(0,6);
}
const GL={Sun:'☉',Moon:'☽',Asc:'↑',Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄',Uranus:'♅',Neptune:'♆',Pluto:'♇'};
function chartGrid(pl){
  const order=['Sun','Moon','Asc','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  return order.filter(k=>pl[k]).map(k=>`<dt>${GL[k]} ${k}</dt><dd>${SIGNS[pl[k].sign]} ${pl[k].deg.toFixed(0)}° ${GLYPH[pl[k].sign]}</dd>`).join('');
}

  const up=EVENTS.filter(e=>new Date(e.date)>=TODAY).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const nextId=up.length?up[0].date:null;
  EVENTS.slice().sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(e=>{
    const past=new Date(e.date)<TODAY, dt=new Date(e.date);
    const b=document.createElement('button');b.className='ev'+(past?' past':'')+(e.date===nextId?' next':'');
    b.innerHTML='<div class="gl">'+eventMoon(e.type,40)+'</div><div class="meta"><div class="d">'+dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+(e.type==='full'?'Full Moon':'New Moon')+'</div><div class="nm">'+e.name+(e.eclipse?'<span class="ecl">'+e.eclipse+'</span>':'')+'</div><div class="deg">'+SIGNS[e.sign]+' '+e.deg+'</div></div>'+(e.date===nextId?'<div class="nextpill">NEXT</div>':'');
    b.onclick=()=>openEvent(e);host.appendChild(b);
  });
}

/* ====== EVENT SHEET (3 lenses) ====== */
function openEvent(e){activeEvent=e;activeTab='a';
  shead.innerHTML='<div class="gl" style="width:54px;margin:2px auto 8px">'+eventMoon(e.type,54)+'</div><div class="d">'+e.dlabel+'</div><h2>'+e.name+'</h2><div class="deg">'+SIGNS[e.sign]+' '+e.deg+' '+GLYPH[e.sign]+(e.eclipse?' · '+e.eclipse:'')+'</div>'+(e.peak?'<div class="peak">'+e.peak+'</div>':'');
  tabs.innerHTML='';
  ['a','f','g'].forEach(k=>{const t=document.createElement('button');t.className='tab'+(k===activeTab?' on':'');t.dataset.k=k;t.textContent=LENS[k];t.onclick=()=>{activeTab=k;document.querySelectorAll('#tabs .tab').forEach(x=>x.classList.toggle('on',x.dataset.k===activeTab));renderEventBody();};tabs.appendChild(t);});
  renderEventBody();openSheet();
}
function renderEventBody(){
  const e=activeEvent;sbody.className='sbody '+(activeTab==='a'?'acc-a':activeTab==='f'?'acc-f':'acc-g');let h='';
  if(activeTab==='a'){const a=e.alm;
    h+='<div class="blk"><h4>🔥 Energy Forecast</h4><p>'+a.f+'</p></div>';
    h+='<div class="blk"><h4>🌹 Lean Into</h4><ul class="pl">'+a.lean.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';
    h+='<div class="blk"><h4>⚠️ Avoid</h4><ul class="pl">'+a.avoid.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';
    if(a.tea)h+='<div class="blk"><h4>☕️ Tea</h4><div class="tea">'+a.tea+'</div></div>';
  } else if(activeTab==='f'){const f=e.fc;
    h+='<div class="blk"><h4>🗝️ Hits Your Chart</h4><p>'+f.hits+'</p></div>';
    h+='<div class="blk"><h4>🔥 You\'ll Feel</h4><ul class="pl">'+f.feel.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';
    h+='<div class="blk"><h4>⚠️ Watch For</h4><ul class="pl">'+f.watch.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';
  } else {const g=e.gr,c=corrBlk(e.sign);
    h+='<div class="blk"><h4>🕯️ '+(e.type==='full'?'Full':'New')+' Moon Magic</h4><p>'+g.blurb+'</p></div>';
    h+='<div class="blk"><h4>🌙 Correspondences</h4><dl class="corr"><dt>element</dt><dd>'+c.el+'</dd><dt>colors</dt><dd>'+c.co+'</dd><dt>herbs</dt><dd>'+c.hb+'</dd><dt>crystals</dt><dd>'+c.cr+'</dd><dt>body</dt><dd>'+c.bd+'</dd></dl></div>';
    h+='<div class="blk"><h4>📜 Prompts</h4><ul class="pl">'+g.prompts.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';
    if(g.tarot)h+='<div class="blk"><h4>🃏 Tarot Spread</h4><div class="tarot">'+g.tarot.map((q,i)=>'<div class="tcard"><div class="tno">'+(i+1)+'</div><div class="tq">'+q+'</div></div>').join('')+'</div></div>';
    const r=g.ritual,key=e.date;ritualState[key]=ritualState[key]||{};
    h+='<div class="blk"><h4>🜂 Ritual</h4><div class="ritual"><div class="rn">'+r.n+'</div><div class="why">'+r.why+'</div><dl class="corr"><dt>items</dt><dd>'+r.items+'</dd><dt>timing</dt><dd>'+r.timing+'</dd></dl><div style="margin-top:10px">'+r.steps.map((s,i)=>'<div class="step'+(ritualState[key][i]?' done':'')+'" data-i="'+i+'"><span class="ck"></span><span>'+s+'</span></div>').join('')+'</div></div></div>';
  }
  sbody.innerHTML=h;
  if(activeTab==='g')sbody.querySelectorAll('.step').forEach(st=>st.onclick=()=>{const k=activeEvent.date,i=+st.dataset.i;ritualState[k][i]=!ritualState[k][i];st.classList.toggle('done');});
}

/* ====== CALENDAR ====== */
function renderCalendar(){
  const host=document.getElementById('calwrap');
  const y=calMonth.getFullYear(),m=calMonth.getMonth();
  const startDow=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  let cells=[];for(let i=0;i<startDow;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(new Date(y,m,d));while(cells.length%7)cells.push(null);
  let h='<div class="calhead"><button class="navb" id="prevM">‹</button><div class="calm">'+calMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'})+'</div><button class="navb" id="nextM">›</button></div>';
  h+='<div class="dow"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div><div class="grid">';
  cells.forEach(c=>{
    if(!c){h+='<div class="cell empty"></div>';return;}
    const id=iso(c),sky=skyNow(new Date(c.getFullYear(),c.getMonth(),c.getDate(),21,0)),lun=EVENTS.find(e=>e.date===id),ue=userEvents.filter(e=>e.date===id),tdy=id===iso(TODAY);
    let marks='';if(lun)marks+='<span class="lmark" style="background:'+(lun.type==='full'?'#EDE6D6':'#7A6E88')+'"></span>';if(ue.length)marks+='<span class="lmark" style="background:var(--gold)"></span>';
    h+='<button class="cell'+(tdy?' today':'')+(lun?' haslun':'')+'" data-iso="'+id+'"><span class="cmoon">'+moonSVG(8,sky.illum,sky.waxing,18)+'</span><span class="cnum">'+c.getDate()+'</span><span class="cmarks">'+marks+'</span></button>';
  });
  h+='</div>';host.innerHTML=h;
  document.getElementById('prevM').onclick=()=>{calMonth=new Date(y,m-1,1);renderCalendar();};
  document.getElementById('nextM').onclick=()=>{calMonth=new Date(y,m+1,1);renderCalendar();};
  host.querySelectorAll('.cell[data-iso]').forEach(b=>b.onclick=()=>openDay(b.dataset.iso));
}
function openDay(id){
  const d=new Date(id+'T12:00:00'),lun=EVENTS.find(e=>e.date===id),ue=userEvents.filter(e=>e.date===id);
  shead.innerHTML='<div class="d">'+d.toLocaleDateString('en-US',{weekday:'long'})+'</div><h2>'+d.toLocaleDateString('en-US',{month:'long',day:'numeric'})+'</h2>';
  tabs.innerHTML='';sbody.className='sbody';let h='';
  if(lun)h+='<div class="blk"><h4>🌙 In the Sky</h4><button class="lunbtn" id="openLun">'+eventMoon(lun.type,30)+'<span><b>'+lun.name+'</b><br><span style="color:var(--gold);font-style:italic;font-size:12px">'+SIGNS[lun.sign]+' '+lun.deg+'</span></span><span style="margin-left:auto;color:var(--faint)">›</span></button></div>';
  h+='<div class="blk"><h4>📌 Your Events</h4><div>'+(ue.length?ue.map(e=>'<div class="uerow"><div><b>'+esc(e.title)+'</b>'+(e.note?'<div style="font-size:12px;color:var(--dust)">'+esc(e.note)+'</div>':'')+'</div><button class="del" data-i="'+userEvents.indexOf(e)+'">✕</button></div>').join(''):'<div style="font-size:13px;color:var(--faint);font-style:italic">nothing yet</div>')+'</div></div>';
  h+='<div class="blk"><h4>➕ Add</h4><div class="form"><div class="field"><input id="ueTitle" placeholder="event title"></div><div class="field"><input id="ueNote" placeholder="note (optional)"></div><button class="btn gold" id="ueSave" style="width:100%">Add to '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</button></div></div>';
  sbody.innerHTML=h;
  if(lun)document.getElementById('openLun').onclick=()=>openEvent(lun);
  document.getElementById('ueSave').onclick=async()=>{const t=document.getElementById('ueTitle').value.trim();if(!t)return;userEvents.push({date:id,title:t,note:document.getElementById('ueNote').value.trim()});await store.set('cc:events',userEvents);renderCalendar();openDay(id);};
  sbody.querySelectorAll('.del').forEach(b=>b.onclick=async()=>{userEvents.splice(+b.dataset.i,1);await store.set('cc:events',userEvents);renderCalendar();openDay(id);});
  openSheet();
}

/* ====== ORBIT (phone book) ====== */
function renderOrbit(){
  const host=document.getElementById('orbitwrap');
  let h='<div class="eyebrow" style="margin:14px 0 4px">tap a name</div><div class="pbook">';
  PEOPLE.forEach(p=>{h+='<button class="prow" data-id="'+p.id+'"><span class="pglyph">'+GLYPH[p.planets.Sun.sign]+'</span><span class="pname">'+p.name+'</span><span class="prole">'+p.role+'</span><span class="pchev">›</span></button>';});
  h+='<button class="prow add" id="addP"><span class="pglyph">+</span><span class="pname">add someone</span></button></div>';
  host.innerHTML=h;
  host.querySelectorAll('.prow[data-id]').forEach(b=>b.onclick=()=>openPerson(PEOPLE.find(p=>p.id===b.dataset.id)));
  document.getElementById('addP').onclick=openAddForm;
}
function openPerson(p){activePerson=p;personTab='syn';
  shead.innerHTML='<div class="d">'+p.role+'</div><h2>'+p.name+'</h2><div class="deg">'+SIGNS[p.planets.Sun.sign]+' '+GLYPH[p.planets.Sun.sign]+' · '+SIGNS[p.planets.Moon.sign]+' '+GLYPH[p.planets.Moon.sign]+' · '+SIGNS[p.planets.Asc.sign]+' rising</div>';
  const subs=[['syn','🔗 Synastry'],['chart','🪐 Chart'],['notes','📝 Notes']];
  tabs.innerHTML='';subs.forEach(s=>{const t=document.createElement('button');t.className='tab'+(s[0]===personTab?' on':'');t.dataset.k=s[0];t.textContent=s[1];t.onclick=()=>{personTab=s[0];document.querySelectorAll('#tabs .tab').forEach(x=>x.classList.toggle('on',x.dataset.k===personTab));renderPersonBody();};tabs.appendChild(t);});
  renderPersonBody();openSheet();
}
function renderPersonBody(){
  const p=activePerson;sbody.className='sbody acc-f';let h='';
  if(personTab==='syn'){const syn=synastry(p);
    h='<div class="blk"><h4>🔗 Against Your Chart</h4><div class="syn">'+syn.map(s=>'<div class="synrow"><div class="sa">'+s.a+'</div><div class="sd">'+s.d+'</div></div>').join('')+'</div></div>';
  } else if(personTab==='chart'){
    h='<div class="blk"><h4>🪐 '+p.name+'\'s Chart</h4><dl class="corr">'+chartGrid(p.planets)+'</dl></div>';
  } else {
    const e=personEdits[p.id]||{},r=p.roster||{};
    if(p.cat==='roster'){
      h='<div class="blk"><h4>📝 Notes</h4><div class="form"><div class="field"><label>last linked 😏</label><input id="nLast" value="'+esc(e.last!=null?e.last:r.last||'')+'"></div><div class="field"><label>how you met</label><input id="nMet" value="'+esc(e.met!=null?e.met:r.met||'')+'"></div><div class="field"><label>status</label><input id="nStatus" value="'+esc(e.status!=null?e.status:r.status||'')+'"></div><div class="field"><label>notes</label><textarea id="nNotes">'+esc(e.notes!=null?e.notes:r.note||'')+'</textarea></div><div class="hint">saves as you type 🤞</div></div></div>';
    } else {
      h='<div class="blk"><h4>📝 Notes</h4><div class="form"><div class="field"><textarea id="nNotes">'+esc(e.notes!=null?e.notes:p.note||'')+'</textarea></div><div class="hint">saves as you type 🤞</div></div></div>';
    }
  }
  sbody.innerHTML=h;
  if(personTab==='notes'){
    const p2=activePerson;
    const save=async()=>{const ed=personEdits[p2.id]||{},g=id=>{const el=document.getElementById(id);return el?el.value:undefined;};
      if(p2.cat==='roster'){ed.last=g('nLast');ed.met=g('nMet');ed.status=g('nStatus');}ed.notes=g('nNotes');
      personEdits[p2.id]=ed;await store.set('cc:personEdits',personEdits);};
    ['nLast','nMet','nStatus','nNotes'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',save);});
  }
}

/* ====== ADD PERSON ====== */
function openAddForm(){
  shead.innerHTML='<div class="d">new entanglement</div><h2>Add Someone</h2>';tabs.innerHTML='';sbody.className='sbody';
  sbody.innerHTML='<div class="form"><div class="field"><label>name</label><input id="afName" placeholder="who is it 👀"></div><div class="field"><label>what they are to you</label><input id="afRole" placeholder="situationship / bestie / the ex…"></div><div class="field"><label>placements — paste em</label><textarea id="afChart" placeholder="Sun Libra 19&#10;Moon Virgo 7&#10;Rising Libra&#10;Mars Scorpio 10&#10;Venus Virgo 25"></textarea><div class="hint">One per line. Sun / Moon / Rising minimum — add Mars, Venus, Mercury for the spicy synastry. Drop degrees if you have em.</div></div><button class="btn gold" id="afSave" style="width:100%">Plug them in</button></div>';
  document.getElementById('afSave').onclick=saveNewPerson;openSheet();
}
function parseChart(text){const planets={},al={rising:'Asc',asc:'Asc',ascendant:'Asc'};
  text.split('\n').forEach(line=>{const m=line.trim().toLowerCase().match(/([a-z]+)\s+([a-z]+)\s*(\d{1,2})?/);if(!m)return;let pl=m[1],sg=m[2];pl=al[pl]||pl.charAt(0).toUpperCase()+pl.slice(1);const si=SIGNS.findIndex(s=>s.toLowerCase()===sg);if(si>=0)planets[pl]={sign:si,deg:m[3]?+m[3]:15};});
  return planets;}
async function saveNewPerson(){
  const name=document.getElementById('afName').value.trim()||'Someone',role=document.getElementById('afRole').value.trim()||'entanglement',planets=parseChart(document.getElementById('afChart').value);
  if(!planets.Sun||!planets.Moon||!planets.Asc){alert('Need at least Sun, Moon + Rising 🪐');return;}
  const acc=['#A684D0','#C9A24B','#C65A2E','#86946A','#7BB0C4'];
  const p={id:'p'+Date.now(),name,role,cat:'roster',accent:acc[PEOPLE.length%acc.length],on:true,planets:L(planets),roster:{last:'—',met:'—',status:'—',note:'freshly added — flesh this out in Notes.'}};
  PEOPLE.push(p);
  const added=(await store.get('cc:addedPeople'))||[];added.push({id:p.id,name,role,cat:'roster',accent:p.accent,planets:planets,roster:p.roster});await store.set('cc:addedPeople',added);
  renderOrbit();closeSheet();
}

/* ====== INIT ====== */
async function init(){
  userEvents=(await store.get('cc:events'))||[];
  personEdits=(await store.get('cc:personEdits'))||{};
  const added=(await store.get('cc:addedPeople'))||[];
  added.forEach(p=>{p.planets=L(p.planets);PEOPLE.push(p);});
  switchView('sky');
}
init();

</script>
